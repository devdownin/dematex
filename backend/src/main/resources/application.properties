spring.datasource.url=jdbc:h2:file:./dematex_index;AUTO_SERVER=TRUE
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
server.compression.enabled=true
logging.level.org.springframework.web=INFO
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200

storage.root=../regulatory_files
storage.watch.enabled=true
storage.watch.debounce-ms=750

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# SpringDoc OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.cache.disabled=true

# Portal Branding
portal.company-name=Dematex Solutions
portal.logo-url=https://angular.dev/assets/images/logos/angular/angular.svg
portal.primary-color=#3f51b5
portal.support-email=support@dematex.com

downloads.signing-secret=dematex-local-signed-download-secret
downloads.link-ttl-seconds=300
